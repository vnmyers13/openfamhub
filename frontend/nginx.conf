server {
  listen 3000;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/css application/javascript application/json;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(js|css|png|ico|svg|woff2)$ {
    expires 1y;
    add_header Cache-Control 'public, immutable';
  }
}
